name: Daily DAX Analysis

on:
  schedule:
    - cron: '0 8 * * *'
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pipeline
        run: python main.py\
               - name: Commit and Push changes
               run: |
                 git config --global user.name "GitHub Action Bot"
                 git config --global user.email "actions@github.com"
                 git add dax_analysis_report.png README.md
                 git commit -m "Auto-update: Analysis results $(date)" || echo "No changes"
                 git push

